services:
  mysql:
    image: mysql:8.4
    container_name: ielts_quest_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ielts_quest
      MYSQL_USER: ielts_user
      MYSQL_PASSWORD: ielts_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ielts_quest_backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: mysql+pymysql://ielts_user:ielts_password@mysql:3306/ielts_quest
      APP_START_DATE: "2026-06-04"
      MATERIAL_PLAN_PATH: /app/material.md
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./material/material.md:/app/material.md:ro
      - ./material/vocabularies:/app/material/vocabularies:ro
      - ./material/collocation:/app/material/collocation:ro

  frontend:
    build: ./frontend
    container_name: ielts_quest_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://127.0.0.1:8000/api
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js:ro

volumes:
  mysql_data:
